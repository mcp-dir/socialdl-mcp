name: Secret scan

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for real secrets
        run: |
          set +e
          FAIL=0
          for pat in 'sk_live_[a-zA-Z0-9]{16,}' 'sk_test_[a-zA-Z0-9]{16,}' 'eyJ[a-zA-Z0-9_-]{20,}\.[a-zA-Z0-9_-]{20,}\.' 'BEGIN (RSA |EC )?PRIVATE KEY' 'MONGODB_URI\s*=\s*mongodb'; do
            hits=$(grep -rEn --exclude-dir=.github "$pat" . || true)
            if [ -n "$hits" ]; then echo "::error::secret-like pattern: $pat"; echo "$hits"; FAIL=1; fi
          done
          [ $FAIL -eq 1 ] && { echo "❌ secret scan failed"; exit 1; }
          echo "✓ no secrets"
